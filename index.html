<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1c1c1e;
  --surface: #2c2c2e;
  --surface2: #3a3a3c;
  --border: #48484a;
  --text: #f2f2f7;
  --text2: #aeaeb2;
  --accent: #ff453a;
  --accent2: #0a84ff;
  --accent3: #30d158;
  --sidebar: 300px;
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier Prime', monospace;
  display: flex;
  flex-direction: column;
}

header {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.5rem 1rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 0.08em;
  white-space: nowrap;
}
header h1 span { color: var(--accent); }
.header-hint { font-size: 0.63rem; color: var(--text2); letter-spacing: 0.04em; }

.btn {
  padding: 0.28rem 0.7rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Courier Prime', monospace;
  font-size: 0.7rem;
  cursor: pointer;
  border-radius: 4px;
  white-space: nowrap;
  transition: background 0.1s;
}
.btn:hover { background: var(--border); }

.dir-toggle { display:flex; border:1px solid var(--border); border-radius:4px; overflow:hidden; }
.dir-btn {
  padding: 0.28rem 0.65rem;
  background: var(--surface2);
  border: none;
  color: var(--text2);
  font-family: 'Courier Prime', monospace;
  font-size: 0.7rem;
  cursor: pointer;
  transition: background 0.1s, color 0.1s;
}
.dir-btn.active { background: var(--accent2); color: white; }

.main { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar);
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.add-bar {
  padding: 0.55rem 0.7rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 0.38rem;
  flex-shrink: 0;
}
.add-bar-row { display: flex; gap: 0.3rem; }
.add-bar input {
  flex: 1; min-width: 0;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Courier Prime', monospace;
  font-size: 0.73rem;
  padding: 0.26rem 0.4rem;
  border-radius: 3px;
  outline: none;
}
.add-bar input:focus { border-color: var(--accent2); }
.add-bar select {
  flex: 1; min-width: 0;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Courier Prime', monospace;
  font-size: 0.7rem;
  padding: 0.24rem 0.35rem;
  border-radius: 3px;
  outline: none;
  cursor: pointer;
}

/* Word list scroll */
.word-list-scroll {
  flex: 1;
  overflow-y: auto;
}
.word-list-scroll::-webkit-scrollbar { width: 4px; }
.word-list-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Category sections */
.cat-section { }

.cat-header {
  display: flex;
  align-items: center;
  gap: 0.38rem;
  padding: 0.32rem 0.6rem 0.32rem 0.45rem;
  cursor: pointer;
  user-select: none;
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 2;
  border-bottom: 1px solid var(--border);
  border-top: 1px solid var(--border);
}
.cat-header:hover { background: var(--surface2); }

.cat-swatch {
  width: 12px; height: 12px;
  border-radius: 2px;
  flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.18);
  position: relative;
  cursor: pointer;
  title: "Change colour";
}
.cat-swatch input[type=color] {
  position: absolute; inset: 0; opacity: 0;
  cursor: pointer; width: 100%; height: 100%;
  border: none; padding: 0;
}

.cat-name-input {
  flex: 1; min-width: 0;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'Courier Prime', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 700;
  outline: none;
  cursor: text;
}

.cat-count { font-size: 0.57rem; color: var(--text2); white-space: nowrap; }

.cat-delete {
  font-size: 0.62rem; color: var(--text2); cursor: pointer;
  padding: 0 2px; opacity: 0; transition: opacity 0.1s;
}
.cat-header:hover .cat-delete { opacity: 1; }
.cat-delete:hover { color: var(--accent); }

.cat-chevron { font-size: 0.58rem; color: var(--text2); transition: transform 0.15s; }
.cat-section.collapsed .cat-chevron { transform: rotate(-90deg); }
.cat-section.collapsed .cat-words { display: none; }

.cat-words {
  padding: 0.18rem 0;
  min-height: 4px; /* so empty cats accept drops */
}
.cat-words.drag-over {
  background: rgba(10,132,255,0.08);
  outline: 1px dashed var(--accent2);
}

.word-item {
  display: flex;
  align-items: center;
  gap: 0.32rem;
  padding: 0.2rem 0.65rem 0.2rem 1.5rem;
  font-size: 0.73rem;
  letter-spacing: 0.02em;
  cursor: grab;
  transition: background 0.07s;
}
.word-item:hover { background: var(--surface2); }
.word-item.dragging { opacity: 0.35; }

.word-dot {
  width: 5px; height: 5px; border-radius: 50%;
  flex-shrink: 0; background: #555;
}
.word-item.placed .word-dot { background: var(--accent3); }

.word-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.word-move-select {
  font-size: 0.58rem; color: var(--text2);
  background: var(--surface2); border: 1px solid var(--border);
  cursor: pointer; font-family: 'Courier Prime', monospace;
  opacity: 0; transition: opacity 0.1s;
  padding: 1px 3px; border-radius: 2px;
  max-width: 70px;
}
.word-item:hover .word-move-select { opacity: 1; }

.word-del {
  font-size: 0.62rem; color: var(--text2); cursor: pointer;
  opacity: 0; transition: opacity 0.1s; padding: 0 2px; flex-shrink: 0;
}
.word-item:hover .word-del { opacity: 1; }
.word-del:hover { color: var(--accent); }

/* Candidates panel */
.candidates-panel {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  max-height: 38%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.cand-hdr { padding: 0.45rem 0.75rem 0.18rem; font-size: 0.58rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text2); }
.cand-sel { padding: 0 0.75rem 0.22rem; font-size: 0.68rem; color: var(--accent2); }
.cand-list { overflow-y: auto; flex: 1; padding: 0.2rem 0.38rem; }
.cand-list::-webkit-scrollbar { width: 4px; }
.cand-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.cand-dir { font-size: 0.55rem; color: var(--text2); letter-spacing: 0.13em; text-transform: uppercase; padding: 0.1rem 0.3rem; }
.cand-item {
  display: flex; align-items: center; gap: 0.32rem;
  padding: 0.2rem 0.38rem; border-radius: 3px; cursor: pointer;
  font-size: 0.71rem; border: 1px solid transparent; transition: background 0.07s;
}
.cand-item:hover { background: var(--surface2); border-color: var(--accent2); }
.cand-dot { width: 7px; height: 7px; border-radius: 1px; flex-shrink: 0; }
.cand-item.cand-placed { opacity: 0.38; }
.cand-item.cand-placed:hover { opacity: 0.6; }
.cand-item.cand-dict { border-left: 2px solid #555; }
.cand-item.cand-dict:hover { border-left-color: var(--accent2); }
.cand-dict-label { font-size: 0.55rem; color: var(--text2); margin-left: auto; white-space: nowrap; letter-spacing:0.05em; }
.cand-badge { font-size: 0.55rem; color: var(--accent); background: rgba(255,69,58,0.12);
  padding: 1px 5px; border-radius: 2px; margin-left: auto; white-space: nowrap; }
.no-cand { padding: 0.38rem 0.75rem; font-size: 0.68rem; color: var(--text2); font-style: italic; }

/* Grid */
.grid-area { flex: 1; overflow: hidden; position: relative; background: var(--bg); }
.grid-viewport { position: absolute; inset: 0; overflow: auto; cursor: crosshair; }
.grid-viewport::-webkit-scrollbar { width: 8px; height: 8px; }
.grid-viewport::-webkit-scrollbar-track { background: var(--bg); }
.grid-viewport::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
canvas { display: block; image-rendering: pixelated; }

.coords { position: absolute; bottom: 8px; right: 12px; font-size: 0.61rem; color: var(--text2);
  pointer-events: none; background: rgba(28,28,30,0.85); padding: 2px 6px; border-radius: 3px; }
.mode-bar { position: absolute; top: 8px; left: 8px; font-size: 0.61rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--accent2); background: rgba(28,28,30,0.85);
  padding: 3px 8px; border-radius: 3px; pointer-events: none; border: 1px solid var(--accent2); }
.zoom-controls { position: absolute; top: 8px; right: 12px; display: flex; gap: 4px; }
.zoom-btn { width: 26px; height: 26px; background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-size: 1rem; cursor: pointer; border-radius: 4px;
  display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
.zoom-btn:hover { background: var(--surface2); }

#drag-ghost {
  position: fixed; pointer-events: none; z-index: 9999;
  background: var(--surface2); border: 1px solid var(--accent2);
  padding: 3px 9px; border-radius: 3px; font-size: 0.7rem;
  font-family: 'Courier Prime', monospace; color: var(--text);
  display: none; white-space: nowrap; top: -100px; left: 0;
}

/* ── Import/Export modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 1000; display: flex; align-items: center; justify-content: center;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1.2rem;
  width: min(520px, 92vw);
  display: flex; flex-direction: column; gap: 0.7rem;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.modal h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem; letter-spacing: 0.08em; color: var(--text);
}
.modal p { font-size: 0.72rem; color: var(--text2); line-height: 1.5; }
.modal textarea {
  width: 100%; height: 180px;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: 'Courier Prime', monospace;
  font-size: 0.68rem; padding: 0.5rem; border-radius: 3px;
  resize: vertical; outline: none; line-height: 1.4;
}
.modal textarea:focus { border-color: var(--accent2); }
.modal-btns { display: flex; gap: 0.5rem; justify-content: flex-end; flex-wrap: wrap; }
.modal-note { font-size: 0.63rem; color: var(--text2); font-style: italic; }

/* ── Discover sidebar ── */
.discover-sidebar {
  width: 280px;
  flex-shrink: 0;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.2s;
}
.discover-sidebar.hidden { width: 0; border: none; overflow: hidden; }

.discover-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.5rem 0.75rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.discover-hdr-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.1em;
  color: var(--accent3);
}
.discover-close {
  font-size: 0.7rem; cursor: pointer; color: var(--text2); padding: 2px 5px;
  border-radius: 3px; transition: background 0.1s;
}
.discover-close:hover { background: var(--surface2); color: var(--accent); }

.discover-summary {
  padding: 0.35rem 0.75rem;
  font-size: 0.65rem;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.discover-scroll {
  flex: 1;
  overflow-y: auto;
}
.discover-scroll::-webkit-scrollbar { width: 4px; }
.discover-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.discover-cell-group {
  border-bottom: 1px solid var(--border);
}
.discover-cell-hdr {
  display: flex; align-items: center; gap: 0.4rem;
  padding: 0.3rem 0.75rem;
  font-size: 0.65rem; color: var(--text2);
  cursor: pointer;
  user-select: none;
  background: var(--surface);
  position: sticky; top: 0; z-index: 1;
}
.discover-cell-hdr:hover { background: var(--surface2); }
.discover-cell-coord { color: var(--accent2); font-weight: 700; }
.discover-cell-badge {
  background: rgba(48,209,88,0.18);
  color: var(--accent3);
  font-size: 0.58rem;
  padding: 1px 6px; border-radius: 10px; margin-left: auto;
}
.discover-cell-words { padding: 0.15rem 0; }
.discover-cell-group.collapsed .discover-cell-words { display: none; }
.discover-cell-group.collapsed .discover-cell-chevron { transform: rotate(-90deg); }
.discover-cell-chevron { font-size: 0.55rem; color: var(--text2); transition: transform 0.15s; }

.discover-cell-group.discover-highlighted > .discover-cell-hdr {
  background: rgba(48,209,88,0.12);
  border-left: 2px solid var(--accent3);
}
.discover-cell-group.discover-focused > .discover-cell-hdr {
  background: rgba(48,209,88,0.22);
  border-left: 3px solid var(--accent3);
  color: var(--accent3);
}
.discover-cell-group.discover-dimmed {
  opacity: 0.28;
}

/* Feature flag toggles */
.flag-toggle {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.18rem 0.55rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Courier Prime', monospace;
  font-size: 0.62rem;
  color: var(--text2);
  white-space: nowrap;
  transition: background 0.1s, border-color 0.1s, color 0.1s;
  user-select: none;
}
.flag-toggle:hover { background: var(--border); }
.flag-toggle.flag-on { border-color: var(--accent); color: var(--accent); background: rgba(255,69,58,0.1); }
.flag-toggle .flag-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--border); flex-shrink: 0; transition: background 0.1s;
}
.flag-toggle.flag-on .flag-dot { background: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>PUZZLE <span>BUILDER</span></h1>
  <div class="dir-toggle">
    <button class="dir-btn active" id="btn-h" onclick="setDir('h')">→ H</button>
    <button class="dir-btn" id="btn-v" onclick="setDir('v')">↓ V</button>
  </div>
  <div class="header-hint">Click grid → type · Drag to select region · ⌘C/X/V copy·cut·paste · Tab = flip direction · Drag words from sidebar</div>
  <div style="display:flex;gap:0.3rem;flex-shrink:0;">
    <div class="flag-toggle" id="flag-inline" onclick="toggleFlag('inline')" title="Block words that run inline with (same direction as) an existing word they overlap">
      <span class="flag-dot"></span>No inline runs
    </div>
    <div class="flag-toggle" id="flag-adjacent" onclick="toggleFlag('adjacent')" title="Block words that start or end immediately next to an existing occupied cell">
      <span class="flag-dot"></span>No adjacency
    </div>
  </div>
  <div style="margin-left:auto;display:flex;gap:0.4rem;">
    <button class="btn" id="btn-undo" onclick="undo()" disabled title="Undo (⌘Z)">↩ Undo</button>
    <button class="btn" id="btn-redo" onclick="redo()" disabled title="Redo (⌘⇧Z)">↪ Redo</button>
    <button class="btn" onclick="clearGrid()">Clear Grid</button>
    <button class="btn" id="btn-discover" onclick="toggleDiscover()" title="Find placement opportunities">🔎 Discover</button>
    <button class="btn" onclick="exportState()">Export</button>
    <button class="btn" onclick="importState()">Import</button>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="add-bar">
      <div class="add-bar-row">
        <input id="new-word-input" placeholder="New word…" maxlength="80"
          onkeydown="if(event.key==='Enter')addWord()">
        <select id="new-word-cat"></select>
        <button class="btn" onclick="addWord()">+</button>
      </div>
      <div class="add-bar-row">
        <input id="new-cat-input" placeholder="New category…" maxlength="40"
          onkeydown="if(event.key==='Enter')addCategory()">
        <button class="btn" onclick="addCategory()">+ Cat</button>
      </div>
    </div>

    <div class="word-list-scroll" id="word-list"></div>

    <div class="candidates-panel">
      <div class="cand-hdr" style="display:flex;align-items:center;justify-content:space-between;">
        <span>Candidate Words</span>
        <button class="btn" id="dict-btn" onclick="lookUpDictionary()" style="font-size:0.58rem;padding:0.15rem 0.5rem;">Dict 🔍</button>
      </div>
      <div class="cand-sel" id="cand-sel">— select a cell —</div>
      <div class="cand-list" id="cand-list"></div>
    </div>
  </div>

  <div class="grid-area">
    <div class="grid-viewport" id="grid-viewport">
      <canvas id="grid-canvas"></canvas>
    </div>
    <div class="mode-bar" id="mode-bar">NAVIGATE</div>
    <div class="coords" id="coords">0, 0</div>
    <div class="zoom-controls">
      <div class="zoom-btn" onclick="zoom(1.25)">+</div>
      <div class="zoom-btn" onclick="zoom(0.8)">−</div>
      <div class="zoom-btn" onclick="zoomFit()" title="Fit view">⊡</div>
    </div>
  </div>

  <!-- Discover sidebar (right) -->
  <div class="discover-sidebar hidden" id="discover-sidebar">
    <div class="discover-hdr">
      <span class="discover-hdr-title">🔎 Discover</span>
      <span class="discover-close" onclick="closeDiscover()">✕ Close</span>
    </div>
    <div class="discover-summary" id="discover-summary"></div>
    <div class="discover-scroll" id="discover-scroll"></div>
  </div>
</div>

<div id="drag-ghost"></div>

<!-- Import/Export modal -->
<div class="modal-overlay hidden" id="io-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modal-title">Export</h2>
    <p id="modal-desc"></p>
    <textarea id="modal-textarea" spellcheck="false"></textarea>
    <div class="modal-note" id="modal-note"></div>
    <div class="modal-btns" id="modal-btns"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const GRID_SIZE = 100;
const cells = Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(null));

// categories: [{id, name, color, words:[string]}]
let categories = [
  { id:'cat1', name:'Films', color:'#ff6b6b',
    words:['The Matrix','Snakes on a Plane','Moon','Rocky Horror Picture Show'] },
  { id:'cat2', name:'Board Games', color:'#4ecdc4',
    words:['Scrabble','Ludo','Carcassonne','Atmosfear'] },
  { id:'cat3', name:'Locations', color:'#ffd93d',
    words:['London','Edinburgh','Birmingham','Loughborough'] },
  { id:'cat4', name:'Pokemon', color:'#a29bfe',
    words:['Pikachu','Charmander','Squirtle','Missingno'] },
];
let catIdSeq = 10;

// derived from scan
let placedWords = [];
let wordIdCounter = 0;
let placedWordSet = new Set();

// UI
let selectedCell = null;
let currentDir = 'h';
let previewWord = null;
let previewWordAll = null; // [{word,row,col,dir}] — all placements shown when hovering sidebar word
let cellSize = 14;

// drag
let dragState = null;
const dragGhost = document.getElementById('drag-ghost');

// collapsed categories
const collapsedCats = new Set();

// ── Feature flags ──────────────────────────────
// Flag A: block placements where the new word runs in the same direction as
//         one of the existing words it overlaps (inline run / word concatenation)
// Flag B: block placements where the word starts or ends immediately adjacent
//         to an existing occupied cell (no breathing room)
const flags = { inline: false, adjacent: false };

function toggleFlag(name) {
  flags[name] = !flags[name];
  const el = document.getElementById('flag-' + name);
  if (el) el.classList.toggle('flag-on', flags[name]);
  // Refresh candidates and discover if open
  updateCandidates();
  if (discoverMode) { runDiscover(); renderDiscoverSidebar(); draw(); }
}

// region selection (drag-select on canvas)
let selRect = null;           // {r1,c1,r2,c2} normalised, null when none
let selDragging = false;      // true while mouse held for region drag
let selDragStart = null;      // {row,col} where drag began
let clipBoard = null;         // { rows: string[][], r1, c1 } internal clipboard

// undo / redo
const UNDO_LIMIT = 50;
let undoStack = [];
let redoStack = [];
let snapshotTimer = null;

// discover mode
let discoverMode = false;
// Map: "r,c" -> { maxOverlap, candidates: [{word,row,col,dir,overlapCount}] }
let discoverMap = new Map();
const collapsedDiscoverCells = new Set();
let discoverRefreshTimer = null;
let discoverHoveredKey = null;  // cell key currently under mouse
let discoverFocusedKey = null;  // cell key locked by click

// ═══════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════
const viewport = document.getElementById('grid-viewport');
const canvas   = document.getElementById('grid-canvas');
const ctx      = canvas.getContext('2d');

function updateCanvasSize() {
  const t = GRID_SIZE * cellSize + 1;
  canvas.width = t; canvas.height = t;
  draw();
}

// ═══════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════
function stripWord(w) { return w.replace(/[\s\-]/g,'').toUpperCase(); }

function catById(id) { return categories.find(c => c.id === id) || null; }

function catForWord(word) { return categories.find(c => c.words.includes(word)) || null; }

function allWords() {
  const out = [];
  for (const cat of categories) for (const w of cat.words) out.push(w);
  return out;
}

function hexToRgb(hex) {
  const n = parseInt(hex.replace('#',''), 16);
  return { r:(n>>16)&255, g:(n>>8)&255, b:n&255 };
}

function catFillRgba(cat, alpha) {
  if (!cat) return `rgba(100,100,100,${alpha})`;
  const {r,g,b} = hexToRgb(cat.color);
  return `rgba(${r},${g},${b},${alpha})`;
}

function lightenHex(hex, amount=0.45) {
  const {r,g,b} = hexToRgb(hex);
  const m = v => Math.round(v + (255-v)*amount);
  return `rgb(${m(r)},${m(g)},${m(b)})`;
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ═══════════════════════════════════════════════
// UNDO / REDO
// ═══════════════════════════════════════════════
function captureSnapshot() {
  // Reuse getStateJSON's sparse format — compact and complete
  const sparseCells = [];
  for (let r = 0; r < GRID_SIZE; r++)
    for (let c = 0; c < GRID_SIZE; c++)
      if (cells[r][c]) sparseCells.push(`${cells[r][c].letter}:${r}:${c}`);
  return JSON.stringify({
    cells: sparseCells,
    categories: categories.map(c=>({id:c.id,name:c.name,color:c.color,words:[...c.words]}))
  });
}

function applySnapshot(snap) {
  const data = JSON.parse(snap);
  // Restore cells
  for (let r=0;r<GRID_SIZE;r++) for (let c=0;c<GRID_SIZE;c++) cells[r][c]=null;
  for (const entry of data.cells) {
    const [l,r,c] = entry.split(':');
    const row=parseInt(r), col=parseInt(c);
    if (row>=0&&row<GRID_SIZE&&col>=0&&col<GRID_SIZE)
      cells[row][col]={letter:l, wordIds:new Set()};
  }
  // Restore categories
  categories = data.categories.map(c=>({
    id:c.id, name:c.name, color:c.color, words:[...c.words]
  }));
  updateCatSelect();
  rescanPlacedWords();
  draw();
}

// Call before any "big" destructive action (word place, paste, cut, clear, category edit)
function snapshot() {
  clearTimeout(snapshotTimer);
  snapshotTimer = null;
  undoStack.push(captureSnapshot());
  if (undoStack.length > UNDO_LIMIT) undoStack.shift();
  redoStack = [];
  updateUndoButtons();
}

// Call for individual letter keypresses — debounced so rapid typing = one undo step
function snapshotSoon() {
  if (snapshotTimer) return; // already pending — don't push again
  // Push *before* the change so we capture the state prior to this burst of typing
  undoStack.push(captureSnapshot());
  if (undoStack.length > UNDO_LIMIT) undoStack.shift();
  redoStack = [];
  updateUndoButtons();
  snapshotTimer = setTimeout(() => { snapshotTimer = null; }, 600);
}

function undo() {
  if (!undoStack.length) return;
  clearTimeout(snapshotTimer); snapshotTimer = null;
  redoStack.push(captureSnapshot());
  applySnapshot(undoStack.pop());
  updateUndoButtons();
}

function redo() {
  if (!redoStack.length) return;
  undoStack.push(captureSnapshot());
  if (undoStack.length > UNDO_LIMIT) undoStack.shift();
  applySnapshot(redoStack.pop());
  updateUndoButtons();
}

function updateUndoButtons() {
  const u = document.getElementById('btn-undo');
  const r = document.getElementById('btn-redo');
  if (u) u.disabled = undoStack.length === 0;
  if (r) r.disabled = redoStack.length === 0;
}

// ═══════════════════════════════════════════════
// DISCOVER MODE
// ═══════════════════════════════════════════════
function runDiscover() {
  discoverMap = new Map();
  const words = allWords();

  // For each filled cell, run getCandidates-style logic against word bank
  // (only unplaced words, overlap >= 2)
  for (let selRow = 0; selRow < GRID_SIZE; selRow++) {
    for (let selCol = 0; selCol < GRID_SIZE; selCol++) {
      if (!cells[selRow][selCol]?.letter) continue;

      const cellCandidates = [];

      for (const word of words) {
        if (placedWordSet.has(word)) continue; // skip already placed
        const letters = stripWord(word), len = letters.length;

        for (const dir of ['h','v']) {
          for (let i = 0; i < len; i++) {
            const startRow = dir==='h' ? selRow : selRow-i;
            const startCol = dir==='h' ? selCol-i : selCol;
            if (startRow<0||startCol<0) continue;
            if ((dir==='h'?startCol+len-1:startRow+len-1) >= GRID_SIZE) continue;
            if (letters[i] !== cells[selRow][selCol].letter) continue;

            let valid = true, ov = 0;
            for (let j = 0; j < len; j++) {
              const r = dir==='h' ? startRow : startRow+j;
              const c = dir==='h' ? startCol+j : startCol;
              const ex = cells[r][c];
              if (ex) { if (ex.letter !== letters[j]) { valid=false; break; } ov++; }
            }
            if (!valid || ov < 2) continue;
            if (!placementPassesFlags(startRow, startCol, dir, len)) continue;

            cellCandidates.push({word, row:startRow, col:startCol, dir, overlapCount:ov});
            break; // one placement per dir per word
          }
        }
      }

      if (cellCandidates.length > 0) {
        const maxOv = Math.max(...cellCandidates.map(c => c.overlapCount));
        const key = `${selRow},${selCol}`;
        const existing = discoverMap.get(key);
        if (!existing || maxOv > existing.maxOverlap) {
          discoverMap.set(key, { maxOverlap: maxOv, candidates: cellCandidates });
        }
      }
    }
  }
}

function toggleDiscover() {
  if (discoverMode) { closeDiscover(); return; }
  discoverMode = true;
  collapsedDiscoverCells.clear();
  document.getElementById('btn-discover').style.background = 'rgba(48,209,88,0.25)';
  document.getElementById('btn-discover').style.borderColor = '#30d158';
  document.getElementById('btn-discover').style.color = '#30d158';
  runDiscover();
  renderDiscoverSidebar();
  document.getElementById('discover-sidebar').classList.remove('hidden');
  draw();
}

function closeDiscover() {
  discoverMode = false;
  discoverMap = new Map();
  discoverHoveredKey = null;
  discoverFocusedKey = null;
  document.getElementById('discover-sidebar').classList.add('hidden');
  const btn = document.getElementById('btn-discover');
  btn.style.background = '';
  btn.style.borderColor = '';
  btn.style.color = '';
  draw();
}

function renderDiscoverSidebar() {
  discoverFocusedKey = null;
  discoverHoveredKey = null;
  const summary = document.getElementById('discover-summary');
  const scroll  = document.getElementById('discover-scroll');

  if (discoverMap.size === 0) {
    summary.textContent = 'No unplaced words fit anywhere with 2+ overlaps.';
    scroll.innerHTML = '';
    return;
  }

  // Collect all unique candidates across all cells, dedupe by word+dir+pos
  const allCands = new Map(); // word -> best candidate entry
  for (const [, info] of discoverMap) {
    for (const cand of info.candidates) {
      const key = `${cand.word}|${cand.dir}|${cand.row}|${cand.col}`;
      if (!allCands.has(key) || cand.overlapCount > allCands.get(key).overlapCount) {
        allCands.set(key, cand);
      }
    }
  }

  const uniqueWords = new Set([...allCands.values()].map(c => c.word));
  summary.textContent = `${uniqueWords.size} word${uniqueWords.size!==1?'s':''} can be placed · ${discoverMap.size} hot cell${discoverMap.size!==1?'s':''}`;

  // Group by cell, sorted by maxOverlap desc
  const entries = [...discoverMap.entries()]
    .sort((a,b) => b[1].maxOverlap - a[1].maxOverlap);

  let html = '';
  for (const [key, info] of entries) {
    const [r,c] = key.split(',').map(Number);
    const isCollapsed = collapsedDiscoverCells.has(key);

    // Sort candidates within this cell by overlap desc
    const sorted = [...info.candidates].sort((a,b) => b.overlapCount - a.overlapCount);
    const byDir = { h: sorted.filter(x=>x.dir==='h'), v: sorted.filter(x=>x.dir==='v') };

    html += `<div class="discover-cell-group${isCollapsed?' collapsed':''}" data-key="${key}">
      <div class="discover-cell-hdr" onclick="toggleDiscoverCell('${key}')">
        <span class="discover-cell-chevron">▾</span>
        <span class="discover-cell-coord">(${c},${r})</span>
        <span style="color:var(--text2);font-size:0.6rem">= ${cells[r][c].letter}</span>
        <span class="discover-cell-badge">${info.maxOverlap} overlaps · ${info.candidates.length} word${info.candidates.length!==1?'s':''}</span>
      </div>
      <div class="discover-cell-words">`;

    for (const [dir, items] of Object.entries(byDir)) {
      if (!items.length) continue;
      html += `<div class="cand-dir">${dir==='h'?'→ Horizontal':'↓ Vertical'}</div>`;
      for (const item of items) {
        const cat = catForWord(item.word);
        const dotStyle = cat ? `background:${cat.color}` : 'background:#555';
        html += `<div class="cand-item"
          data-word="${encodeURIComponent(item.word)}"
          data-row="${item.row}" data-col="${item.col}" data-dir="${item.dir}"
          onmouseenter="showPreview(this)" onmouseleave="clearPreview()"
          onclick="discoverPlace(this)">
          <span class="cand-dot" style="${dotStyle}"></span>
          <span>${esc(item.word)}</span>
          <span class="cand-badge">${item.overlapCount}</span>
        </div>`;
      }
    }

    html += `</div></div>`;
  }

  scroll.innerHTML = html;
}

function toggleDiscoverCell(key) {
  if (collapsedDiscoverCells.has(key)) collapsedDiscoverCells.delete(key);
  else collapsedDiscoverCells.add(key);
  const el = document.querySelector(`.discover-cell-group[data-key="${key}"]`);
  if (el) el.classList.toggle('collapsed', collapsedDiscoverCells.has(key));
}

// Hover: highlight one group, dim others (no filtering)
function applyDiscoverHighlight(key) {
  const groups = document.querySelectorAll('.discover-cell-group');
  groups.forEach(g => {
    g.classList.remove('discover-highlighted', 'discover-dimmed', 'discover-focused');
    if (key) {
      if (g.dataset.key === key) {
        g.classList.add('discover-highlighted');
        g.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      } else {
        g.classList.add('discover-dimmed');
      }
    }
  });
}

// Click: show only focused cell's group, hide others; update summary
function applyDiscoverFocus(key) {
  const scroll = document.getElementById('discover-scroll');
  const summary = document.getElementById('discover-summary');
  const info = discoverMap.get(key);
  if (!info) return;

  const [r, c] = key.split(',').map(Number);

  // Update summary
  summary.innerHTML = `<span style="color:var(--accent3)">📍 (${c},${r}) = ${cells[r][c]?.letter}</span>
    &nbsp;·&nbsp;${info.candidates.length} candidate${info.candidates.length!==1?'s':''}
    &nbsp;<span style="cursor:pointer;color:var(--text2);font-size:0.65rem" onclick="clearDiscoverFocus()">✕ show all</span>`;

  // Render only this cell's candidates
  const sorted = [...info.candidates].sort((a,b) => b.overlapCount - a.overlapCount);
  const byDir = { h: sorted.filter(x=>x.dir==='h'), v: sorted.filter(x=>x.dir==='v') };

  let html = `<div class="discover-cell-group discover-focused" data-key="${key}">
    <div class="discover-cell-words">`;

  for (const [dir, items] of Object.entries(byDir)) {
    if (!items.length) continue;
    html += `<div class="cand-dir">${dir==='h'?'→ Horizontal':'↓ Vertical'}</div>`;
    for (const item of items) {
      const cat = catForWord(item.word);
      const dotStyle = cat ? `background:${cat.color}` : 'background:#555';
      html += `<div class="cand-item"
        data-word="${encodeURIComponent(item.word)}"
        data-row="${item.row}" data-col="${item.col}" data-dir="${item.dir}"
        onmouseenter="showPreview(this)" onmouseleave="clearPreview()"
        onclick="discoverPlace(this)">
        <span class="cand-dot" style="${dotStyle}"></span>
        <span>${esc(item.word)}</span>
        <span class="cand-badge">${item.overlapCount}</span>
      </div>`;
    }
  }

  html += `</div></div>`;
  scroll.innerHTML = html;
}

function clearDiscoverFocus() {
  discoverFocusedKey = null;
  discoverHoveredKey = null;
  renderDiscoverSidebar();
}

function discoverPlace(el) {
  const word = decodeURIComponent(el.dataset.word);
  placeWordOnGrid(word, +el.dataset.row, +el.dataset.col, el.dataset.dir);
  previewWord = null;
  // Re-run discover to refresh results
  runDiscover();
  renderDiscoverSidebar();
}

// ═══════════════════════════════════════════════
// SCAN
// ═══════════════════════════════════════════════
function rescanPlacedWords() {
  for (let r=0;r<GRID_SIZE;r++)
    for (let c=0;c<GRID_SIZE;c++)
      if (cells[r][c]) cells[r][c].wordIds = new Set();

  placedWords = []; wordIdCounter = 0;

  for (const word of allWords()) {
    const letters = stripWord(word);
    if (!letters.length) continue;
    const len = letters.length;
    const cat = catForWord(word);

    // horizontal
    for (let r=0; r<GRID_SIZE; r++) {
      for (let c=0; c<=GRID_SIZE-len; c++) {
        let ok = true;
        for (let i=0;i<len;i++) { if (cells[r][c+i]?.letter!==letters[i]){ok=false;break;} }
        if (ok) {
          const id = ++wordIdCounter;
          placedWords.push({id, word, catId: cat?.id||null, row:r, col:c, dir:'h'});
          for (let i=0;i<len;i++) cells[r][c+i].wordIds.add(id);
        }
      }
    }
    // vertical
    for (let c=0; c<GRID_SIZE; c++) {
      for (let r=0; r<=GRID_SIZE-len; r++) {
        let ok = true;
        for (let i=0;i<len;i++) { if (cells[r+i][c]?.letter!==letters[i]){ok=false;break;} }
        if (ok) {
          const id = ++wordIdCounter;
          placedWords.push({id, word, catId: cat?.id||null, row:r, col:c, dir:'v'});
          for (let i=0;i<len;i++) cells[r+i][c].wordIds.add(id);
        }
      }
    }
  }

  placedWordSet = new Set(placedWords.map(p => p.word));
  renderWordList();
  saveToLocalStorage();
  // Refresh discover results if open, debounced to avoid thrashing on rapid edits
  if (discoverMode) {
    clearTimeout(discoverRefreshTimer);
    discoverRefreshTimer = setTimeout(() => {
      runDiscover();
      renderDiscoverSidebar();
      draw(); // redraw so grid highlights update too
    }, 400);
  }
}

// Build per-cell category colour lookup for drawing — returns Set of unique cats per cell
function buildCellCatMap() {
  const map = new Map(); // "r,c" -> Cat[] (unique, in encounter order)
  for (const pw of placedWords) {
    const cat = pw.catId ? catById(pw.catId) : null;
    if (!cat) continue;
    const letters = stripWord(pw.word);
    for (let i=0; i<letters.length; i++) {
      const r = pw.dir==='h' ? pw.row : pw.row+i;
      const c = pw.dir==='h' ? pw.col+i : pw.col;
      const key = `${r},${c}`;
      if (!map.has(key)) map.set(key, []);
      const arr = map.get(key);
      if (!arr.includes(cat)) arr.push(cat);
    }
  }
  return map;
}

// Draw a cell background split into N equal segments from top-left,
// each segment filled with the corresponding category colour.
// Segments are defined by rays from top-left corner (0,0) of the cell
// dividing the cell's area using the diagonal-fan approach.
function drawCellSegments(x, y, cs, cats, alpha) {
  const n = cats.length;
  if (n === 0) return;
  if (n === 1) {
    ctx.fillStyle = catFillRgba(cats[0], alpha);
    ctx.fillRect(x+1, y+1, cs-1, cs-1);
    return;
  }

  // We'll clip to the cell interior
  ctx.save();
  ctx.beginPath();
  ctx.rect(x+1, y+1, cs-1, cs-1);
  ctx.clip();

  // Origin at top-left corner of cell
  const ox = x, oy = y;

  // Generate N+1 boundary rays from top-left.
  // We trace the perimeter of the square clockwise from (cs,0) to form N equal-area segments.
  // Total perimeter: 4 * cs. Each segment = 4*cs / n.
  const perim = 4 * cs;
  const segLen = perim / n;

  // Convert a perimeter distance (starting from top-right corner, going clockwise) to a point
  function perimPoint(d) {
    d = ((d % perim) + perim) % perim;
    if (d <= cs)        return [x + cs, y + d];          // right edge top→bottom
    else if (d <= 2*cs) return [x + cs - (d-cs), y + cs]; // bottom edge right→left
    else if (d <= 3*cs) return [x, y + cs - (d-2*cs)];    // left edge bottom→top
    else                return [x + (d-3*cs), y];          // top edge left→right
  }

  for (let i = 0; i < n; i++) {
    const d0 = i * segLen;
    const d1 = (i + 1) * segLen;

    ctx.beginPath();
    ctx.moveTo(ox, oy); // always start from top-left

    // Trace the perimeter arc from d0 to d1, hitting all corners in between
    const [sx, sy] = perimPoint(d0);
    ctx.lineTo(sx, sy);

    // Walk through any corners between d0 and d1
    const cornerDists = [0, cs, 2*cs, 3*cs, 4*cs];
    for (const cd of cornerDists) {
      if (cd > d0 && cd < d1) {
        const [cx2, cy2] = perimPoint(cd);
        ctx.lineTo(cx2, cy2);
      }
    }

    const [ex2, ey2] = perimPoint(d1);
    ctx.lineTo(ex2, ey2);
    ctx.closePath();

    ctx.fillStyle = catFillRgba(cats[i], alpha);
    ctx.fill();
  }

  ctx.restore();
}

// ═══════════════════════════════════════════════
// GRID MUTATIONS
// ═══════════════════════════════════════════════
function placeWordOnGrid(word, row, col, dir) {
  snapshot();
  const letters = stripWord(word);
  for (let i=0; i<letters.length; i++) {
    const r = dir==='h' ? row : row+i;
    const c = dir==='h' ? col+i : col;
    if (r<0||r>=GRID_SIZE||c<0||c>=GRID_SIZE) continue;
    if (!cells[r][c]) cells[r][c] = {letter:letters[i], wordIds:new Set()};
    else cells[r][c].letter = letters[i];
  }
  rescanPlacedWords(); draw();
}

function setCellLetter(row, col, letter) {
  if (row<0||row>=GRID_SIZE||col<0||col>=GRID_SIZE) return;
  snapshotSoon();
  if (letter==='') cells[row][col] = null;
  else {
    if (!cells[row][col]) cells[row][col]={letter:letter.toUpperCase(),wordIds:new Set()};
    else cells[row][col].letter = letter.toUpperCase();
  }
  rescanPlacedWords(); draw();
}

function clearGrid() {
  if (!confirm('Clear the entire grid?')) return;
  snapshot();
  for (let r=0;r<GRID_SIZE;r++) for (let c=0;c<GRID_SIZE;c++) cells[r][c]=null;
  placedWords=[]; placedWordSet=new Set();
  selectedCell=null; previewWord=null;
  renderWordList(); updateCandidates(); saveToLocalStorage(); draw();
}

// ═══════════════════════════════════════════════
// DRAWING
// ═══════════════════════════════════════════════
function draw() {
  const cs = cellSize;
  const total = GRID_SIZE * cs + 1;
  ctx.clearRect(0,0,total,total);
  ctx.fillStyle = '#1c1c1e';
  ctx.fillRect(0,0,total,total);

  // Highlight central 30×30 region
  const margin = 35; // (100 - 30) / 2
  ctx.fillStyle = '#222224';
  ctx.fillRect(margin * cs, margin * cs, 30 * cs, 30 * cs);

  ctx.strokeStyle = '#252527'; ctx.lineWidth = 0.5;
  for (let i=0;i<=GRID_SIZE;i++) {
    ctx.beginPath(); ctx.moveTo(i*cs,0); ctx.lineTo(i*cs,total); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*cs); ctx.lineTo(total,i*cs); ctx.stroke();
  }

  const selWordIds = selectedCell && cells[selectedCell.row]?.[selectedCell.col]
    ? cells[selectedCell.row][selectedCell.col].wordIds : new Set();

  // preview — single candidate hover (previewWord) or all-placements hover (previewWordAll)
  const prevMap = new Map(); // key -> letter
  const prevSources = previewWordAll
    ? previewWordAll
    : (previewWord ? [previewWord] : []);
  for (const pw of prevSources) {
    const letters = stripWord(pw.word);
    for (let i=0;i<letters.length;i++) {
      const r = pw.dir==='h' ? pw.row : pw.row+i;
      const c = pw.dir==='h' ? pw.col+i : pw.col;
      prevMap.set(`${r},${c}`, letters[i]);
    }
  }

  const catMap = buildCellCatMap();

  for (let r=0;r<GRID_SIZE;r++) {
    for (let c=0;c<GRID_SIZE;c++) {
      const x=c*cs, y=r*cs;
      const cell = cells[r][c];
      const key = `${r},${c}`;
      const isPrev = prevMap.has(key);
      const isSel  = selectedCell && selectedCell.row===r && selectedCell.col===c;

      if (isPrev) {
        const isExist = !!cell;
        ctx.fillStyle = isExist ? 'rgba(255,214,10,0.42)' : 'rgba(255,214,10,0.17)';
        ctx.fillRect(x+1,y+1,cs-1,cs-1);
        ctx.strokeStyle='#ffd60a'; ctx.lineWidth=1;
        ctx.strokeRect(x+0.5,y+0.5,cs,cs);
        ctx.fillStyle = isExist ? '#111' : '#ffd60a';
        ctx.font = `bold ${Math.max(8,cs*0.52)}px "Courier Prime",monospace`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(prevMap.get(key), x+cs/2, y+cs/2+1);

      } else if (cell) {
        const sameWord = [...selWordIds].some(id => cell.wordIds.has(id));
        const cats = catMap.get(key) || [];
        const cat = cats[0] || null; // primary cat for letter colour

        // Background — segmented if multiple categories
        const bgAlpha = sameWord ? 0.5 : 0.2;
        if (cats.length > 0) {
          drawCellSegments(x, y, cs, cats, bgAlpha);
        } else {
          ctx.fillStyle = sameWord ? 'rgba(10,132,255,0.25)' : '#2c2c2e';
          ctx.fillRect(x+1, y+1, cs-1, cs-1);
        }

        // Letter
        if (sameWord) {
          ctx.fillStyle = cat ? lightenHex(cat.color, 0.6) : '#60c8ff';
        } else if (cat) {
          ctx.fillStyle = lightenHex(cat.color, 0.35);
        } else {
          ctx.fillStyle = '#f2f2f7';
        }
        ctx.font = `bold ${Math.max(8,cs*0.52)}px "Courier Prime",monospace`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(cell.letter, x+cs/2, y+cs/2+1);
      }

      if (isSel) {
        ctx.strokeStyle='#0a84ff'; ctx.lineWidth=2;
        ctx.strokeRect(x+1,y+1,cs-2,cs-2);
      }
    }
  }

  // Selection rectangle overlay
  if (selRect) {
    const {r1,c1,r2,c2} = selRect;
    const rx = c1*cs, ry = r1*cs;
    const rw = (c2-c1+1)*cs, rh = (r2-r1+1)*cs;
    ctx.fillStyle = 'rgba(10,132,255,0.10)';
    ctx.fillRect(rx+1, ry+1, rw-1, rh-1);
    ctx.strokeStyle = '#0a84ff';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 3]);
    ctx.strokeRect(rx+0.75, ry+0.75, rw, rh);
    ctx.setLineDash([]);
  }

  // Discover mode highlights
  if (discoverMode && discoverMap.size > 0) {
    for (const [key, info] of discoverMap) {
      const [r, c] = key.split(',').map(Number);
      const x = c*cs, y = r*cs;
      // Green border
      ctx.strokeStyle = '#30d158';
      ctx.lineWidth = cs >= 14 ? 1.5 : 1;
      ctx.strokeRect(x+1, y+1, cs-2, cs-2);
      // Overlap count badge (top-right corner, only when zoomed in enough)
      if (cs >= 16) {
        const label = String(info.maxOverlap);
        const bw = Math.max(10, cs * 0.38);
        const bh = cs * 0.35;
        ctx.fillStyle = 'rgba(48,209,88,0.85)';
        ctx.fillRect(x + cs - bw, y, bw, bh);
        ctx.fillStyle = '#000';
        ctx.font = `bold ${Math.max(6, cs*0.26)}px "Courier Prime",monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(label, x + cs - bw/2, y + bh/2);
      }
    }
  }

  // Axis numbers
  if (cs>=14) {
    ctx.fillStyle='#3a3a3c';
    ctx.font=`${Math.max(6,cs*0.28)}px "Courier Prime",monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    for (let i=0;i<GRID_SIZE;i+=10) {
      ctx.fillText(i,(i+5)*cs,5);
      ctx.fillText(i,5,(i+5)*cs);
    }
  }
}

// ═══════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════
function cellFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width/rect.width, sy = canvas.height/rect.height;
  return {
    col: Math.floor((e.clientX-rect.left)*sx/cellSize),
    row: Math.floor((e.clientY-rect.top)*sy/cellSize)
  };
}

canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  const {row,col} = cellFromEvent(e);
  if (row<0||row>=GRID_SIZE||col<0||col>=GRID_SIZE) return;
  selDragging = true;
  selDragStart = {row,col};
  selRect = {r1:row,c1:col,r2:row,c2:col};
  // Don't commit selected cell yet — wait for mouseup to distinguish click from drag
  e.preventDefault();
});

canvas.addEventListener('mousemove', e => {
  const {row,col} = cellFromEvent(e);
  document.getElementById('coords').textContent = `${col}, ${row}`;

  if (discoverMode && !discoverFocusedKey) {
    const key = `${row},${col}`;
    const newHover = discoverMap.has(key) ? key : null;
    if (newHover !== discoverHoveredKey) {
      discoverHoveredKey = newHover;
      applyDiscoverHighlight(discoverHoveredKey);
    }
  }

  if (!selDragging || !selDragStart) return;
  const r1=Math.min(selDragStart.row,row), r2=Math.max(selDragStart.row,row);
  const c1=Math.min(selDragStart.col,col), c2=Math.max(selDragStart.col,col);
  selRect = {r1,c1,r2,c2};
  draw();
});

canvas.addEventListener('mouseup', e => {
  if (!selDragging) return;
  selDragging = false;
  const {row,col} = cellFromEvent(e);
  const clampedRow = Math.max(0,Math.min(GRID_SIZE-1,row));
  const clampedCol = Math.max(0,Math.min(GRID_SIZE-1,col));

  const isDrag = selRect &&
    (selRect.r2 > selRect.r1 || selRect.c2 > selRect.c1);

  if (isDrag) {
    // Region selected — keep selRect, clear single-cell selection
    selectedCell = null;
    previewWord = null;
    document.getElementById('mode-bar').textContent = 'REGION';
    updateCandidates();
  } else {
    // Simple click
    const key = `${clampedRow},${clampedCol}`;
    if (discoverMode && discoverMap.has(key)) {
      // Toggle focus on this discover cell
      if (discoverFocusedKey === key) {
        discoverFocusedKey = null;
        discoverHoveredKey = key;
        applyDiscoverHighlight(key);
      } else {
        discoverFocusedKey = key;
        discoverHoveredKey = null;
        applyDiscoverFocus(key);
      }
    } else {
      selRect = null;
      previewWord = null;
      if (selectedCell && selectedCell.row===clampedRow && selectedCell.col===clampedCol) {
        currentDir = currentDir==='h'?'v':'h'; updateDirUI();
      } else { selectedCell = {row:clampedRow, col:clampedCol}; }
      document.getElementById('mode-bar').textContent = 'EDIT';
      updateCandidates();
    }
  }
  draw();
});

canvas.addEventListener('mouseleave', e => {
  if (selDragging) {
    selDragging = false;
    draw();
  }
  if (discoverMode && !discoverFocusedKey && discoverHoveredKey) {
    discoverHoveredKey = null;
    applyDiscoverHighlight(null);
  }
});

window.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT') return;
  if (!document.getElementById('io-modal').classList.contains('hidden')) return;

  // ── Copy / Cut / Paste (work whether or not a cell is selected) ──
  if ((e.ctrlKey||e.metaKey) && e.key==='c') { e.preventDefault(); copyRegion(false); return; }
  if ((e.ctrlKey||e.metaKey) && e.key==='x') { e.preventDefault(); copyRegion(true);  return; }
  if ((e.ctrlKey||e.metaKey) && e.key==='v') { e.preventDefault(); pasteRegion();      return; }

  // ── Undo / Redo ──
  if ((e.ctrlKey||e.metaKey) && e.key==='z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
  if ((e.ctrlKey||e.metaKey) && (e.key==='y' || (e.key==='z' && e.shiftKey))) { e.preventDefault(); redo(); return; }

  // ── Cmd/Ctrl + Backspace: delete word(s) under cursor, keeping shared letters ──
  if ((e.ctrlKey||e.metaKey) && e.key==='Backspace') {
    e.preventDefault();
    if (!selectedCell) return;
    const {row, col} = selectedCell;
    const cell = cells[row][col];
    if (!cell || !cell.wordIds.size) return;

    // Find all placed words that pass through the selected cell
    const wordsToDelete = placedWords.filter(pw => cell.wordIds.has(pw.id));
    if (!wordsToDelete.length) return;

    snapshot();

    for (const pw of wordsToDelete) {
      const letters = stripWord(pw.word);
      for (let i = 0; i < letters.length; i++) {
        const r = pw.dir==='h' ? pw.row : pw.row+i;
        const c = pw.dir==='h' ? pw.col+i : pw.col;
        const targetCell = cells[r][c];
        if (!targetCell) continue;

        // Only delete this cell if no OTHER placed word (outside wordsToDelete) uses it
        const deletingIds = new Set(wordsToDelete.map(w => w.id));
        const usedByOther = [...targetCell.wordIds].some(id => !deletingIds.has(id));
        if (!usedByOther) cells[r][c] = null;
      }
    }

    rescanPlacedWords(); draw();
    return;
  }

  // ── Escape: clear region or cell ──
  if (e.key==='Escape') {
    if (selRect) { selRect=null; draw(); document.getElementById('mode-bar').textContent='NAVIGATE'; return; }
    if (selectedCell) {
      selectedCell=null; previewWord=null;
      document.getElementById('mode-bar').textContent='NAVIGATE';
      updateCandidates(); draw();
    }
    return;
  }

  // ── Delete key on a region ──
  if ((e.key==='Backspace'||e.key==='Delete') && selRect) {
    e.preventDefault();
    snapshot();
    const {r1,c1,r2,c2}=selRect;
    for(let r=r1;r<=r2;r++) for(let c=c1;c<=c2;c++) cells[r][c]=null;
    rescanPlacedWords(); draw(); return;
  }

  // ── Single-cell editing (requires selectedCell) ──
  if (!selectedCell) return;
  const {row,col} = selectedCell;

  if (e.key==='Tab') { e.preventDefault(); currentDir=currentDir==='h'?'v':'h'; updateDirUI(); return; }

  if (e.key==='Backspace'||e.key==='Delete') {
    e.preventDefault();
    setCellLetter(row,col,'');
    if (currentDir==='h'&&col>0) selectedCell={row,col:col-1};
    else if (currentDir==='v'&&row>0) selectedCell={row:row-1,col};
    updateCandidates(); draw(); return;
  }
  if (e.key==='ArrowRight'){e.preventDefault();selectedCell={row,col:Math.min(col+1,GRID_SIZE-1)};updateCandidates();draw();return;}
  if (e.key==='ArrowLeft') {e.preventDefault();selectedCell={row,col:Math.max(col-1,0)};updateCandidates();draw();return;}
  if (e.key==='ArrowDown') {e.preventDefault();selectedCell={row:Math.min(row+1,GRID_SIZE-1),col};updateCandidates();draw();return;}
  if (e.key==='ArrowUp')   {e.preventDefault();selectedCell={row:Math.max(row-1,0),col};updateCandidates();draw();return;}
  if (/^[a-zA-Z]$/.test(e.key)) {
    e.preventDefault();
    setCellLetter(row,col,e.key.toUpperCase());
    if (currentDir==='h') selectedCell={row,col:Math.min(col+1,GRID_SIZE-1)};
    else selectedCell={row:Math.min(row+1,GRID_SIZE-1),col};
    updateCandidates(); draw();
  }
});

function setDir(d){currentDir=d;updateDirUI();}
function updateDirUI(){
  document.getElementById('btn-h').classList.toggle('active',currentDir==='h');
  document.getElementById('btn-v').classList.toggle('active',currentDir==='v');
}

// ═══════════════════════════════════════════════
// COPY / CUT / PASTE
// ═══════════════════════════════════════════════
function copyRegion(cut=false) {
  if (!selRect) return;
  const {r1,c1,r2,c2} = selRect;
  const rows = [];
  for (let r=r1; r<=r2; r++) {
    const row = [];
    for (let c=c1; c<=c2; c++) row.push(cells[r][c]?.letter || '');
    rows.push(row);
  }
  clipBoard = { rows, r1, c1 };

  if (cut) {
    snapshot();
    for (let r=r1; r<=r2; r++)
      for (let c=c1; c<=c2; c++) cells[r][c] = null;
    rescanPlacedWords(); draw();
  }

  // Also write to system clipboard as plain text grid
  const text = rows.map(r => r.join('\t')).join('\n');
  try { navigator.clipboard.writeText(text).catch(()=>{}); } catch(_){}

  // Flash the mode bar
  const bar = document.getElementById('mode-bar');
  bar.textContent = cut ? 'CUT' : 'COPIED';
  setTimeout(() => bar.textContent = selRect ? 'REGION' : 'EDIT', 800);
}

function pasteRegion() {
  if (!clipBoard) return;
  snapshot();
  // Paste origin: top-left of selRect, or selectedCell, or top-left of original copy
  let originRow = clipBoard.r1, originCol = clipBoard.c1;
  if (selRect) { originRow = selRect.r1; originCol = selRect.c1; }
  else if (selectedCell) { originRow = selectedCell.row; originCol = selectedCell.col; }

  const { rows } = clipBoard;
  for (let dr=0; dr<rows.length; dr++) {
    for (let dc=0; dc<rows[dr].length; dc++) {
      const r=originRow+dr, c=originCol+dc;
      if (r<0||r>=GRID_SIZE||c<0||c>=GRID_SIZE) continue;
      const letter = rows[dr][dc];
      if (letter) {
        if (!cells[r][c]) cells[r][c]={letter,wordIds:new Set()};
        else cells[r][c].letter=letter;
      }
    }
  }

  // Update selRect to show the pasted region
  selRect = {
    r1: originRow, c1: originCol,
    r2: originRow+rows.length-1,
    c2: originCol+rows[0].length-1
  };
  rescanPlacedWords(); draw();
}

// ═══════════════════════════════════════════════
// ZOOM
// ═══════════════════════════════════════════════
function zoom(factor) {
  const vp=viewport;
  const cx=vp.scrollLeft+vp.clientWidth/2, cy=vp.scrollTop+vp.clientHeight/2;
  const old=cellSize;
  cellSize=Math.max(8,Math.min(60,Math.round(cellSize*factor)));
  updateCanvasSize();
  const sc=cellSize/old;
  vp.scrollLeft=cx*sc-vp.clientWidth/2; vp.scrollTop=cy*sc-vp.clientHeight/2;
}
function zoomFit(){cellSize=14;updateCanvasSize();viewport.scrollLeft=0;viewport.scrollTop=0;}
viewport.addEventListener('wheel',e=>{
  if(e.ctrlKey||e.metaKey){e.preventDefault();zoom(e.deltaY<0?1.1:0.9);}
},{passive:false});

// ═══════════════════════════════════════════════
// PLACEMENT FLAG VALIDATION
// ═══════════════════════════════════════════════

// Flag A — "No inline runs"
// Returns true (fail) if the candidate word, when placed at (startRow,startCol,dir),
// runs in the same direction as any existing placed word it overlaps with.
// "Overlap" here means sharing a cell — i.e. the existing word also passes through that cell.
function failsInlineRun(startRow, startCol, dir, len) {
  for (let i = 0; i < len; i++) {
    const r = dir==='h' ? startRow : startRow+i;
    const c = dir==='h' ? startCol+i : startCol;
    const cell = cells[r][c];
    if (!cell || !cell.wordIds.size) continue;
    // Check if any word in this cell runs the same direction
    for (const id of cell.wordIds) {
      const pw = placedWords.find(p => p.id === id);
      if (pw && pw.dir === dir) return true;
    }
  }
  return false;
}

// Flag B — "No adjacency"
// Returns true (fail) if the cell immediately before the word's start
// or immediately after the word's end is occupied.
function failsAdjacency(startRow, startCol, dir, len) {
  // Cell just before start
  const preR = dir==='h' ? startRow : startRow-1;
  const preC = dir==='h' ? startCol-1 : startCol;
  if (preR >= 0 && preC >= 0 && cells[preR][preC]) return true;
  // Cell just after end
  const endR = dir==='h' ? startRow : startRow+len;
  const endC = dir==='h' ? startCol+len : startCol;
  if (endR < GRID_SIZE && endC < GRID_SIZE && cells[endR][endC]) return true;
  return false;
}

// Master gate — call after confirming letter-compatibility
function placementPassesFlags(startRow, startCol, dir, len) {
  if (flags.inline   && failsInlineRun(startRow, startCol, dir, len)) return false;
  if (flags.adjacent && failsAdjacency(startRow, startCol, dir, len)) return false;
  return true;
}

// ═══════════════════════════════════════════════
// CANDIDATES
// ═══════════════════════════════════════════════
function getCandidates(selRow, selCol) {
  const results = [];
  for (const word of allWords()) {
    const letters = stripWord(word), len = letters.length;
    for (const dir of ['h','v']) {
      for (let i=0;i<len;i++) {
        const startRow = dir==='h' ? selRow : selRow-i;
        const startCol = dir==='h' ? selCol-i : selCol;
        if (startRow<0||startCol<0) continue;
        if ((dir==='h'?startCol+len-1:startRow+len-1) >= GRID_SIZE) continue;
        if (letters[i] !== cells[selRow][selCol]?.letter) continue;
        let valid=true, ov=0;
        for (let j=0;j<len;j++) {
          const r=dir==='h'?startRow:startRow+j;
          const c=dir==='h'?startCol+j:startCol;
          const ex=cells[r][c];
          if (ex){if(ex.letter!==letters[j]){valid=false;break;}ov++;}
        }
        if (!valid) continue;
        if (!placementPassesFlags(startRow, startCol, dir, len)) continue;
        results.push({word, row:startRow, col:startCol, dir, overlapCount:ov});
        break;
      }
    }
  }
  results.sort((a,b) => {
    const aPlaced = placedWordSet.has(a.word) ? 1 : 0;
    const bPlaced = placedWordSet.has(b.word) ? 1 : 0;
    if (aPlaced !== bPlaced) return aPlaced - bPlaced;
    return b.overlapCount - a.overlapCount;
  });
  return results;
}

function updateCandidates() {
  const sel=document.getElementById('cand-sel');
  const list=document.getElementById('cand-list');
  // Always reset the dict button when the cell changes
  const btn = document.getElementById('dict-btn');
  if (btn) { btn.textContent = 'Dict 🔍'; btn.disabled = false; }
  if (!selectedCell){sel.textContent='— select a cell —';list.innerHTML='';return;}
  const {row,col}=selectedCell;
  const letter=cells[row][col]?.letter;
  if (!letter){
    sel.textContent=`(${col}, ${row}) — empty`;
    list.innerHTML='<div class="no-cand">Type a letter first</div>'; return;
  }
  sel.textContent=`(${col}, ${row}) = "${letter}"`;
  const cands=getCandidates(row,col);
  if(!cands.length){list.innerHTML='<div class="no-cand">No words fit here</div>';return;}
  const byDir={h:[],v:[]};
  for(const c of cands) byDir[c.dir].push(c);
  let html='';
  for(const [dir,items] of Object.entries(byDir)){
    if(!items.length) continue;
    html+=`<div class="cand-dir">${dir==='h'?'→ Horizontal':'↓ Vertical'}</div>`;
    for(const item of items){
      const cat=catForWord(item.word);
      const dotStyle=cat?`background:${cat.color}`:'background:#555';
      const isPlaced = placedWordSet.has(item.word);
      html+=`<div class="cand-item${isPlaced?' cand-placed':''}"
        data-word="${encodeURIComponent(item.word)}"
        data-row="${item.row}" data-col="${item.col}" data-dir="${item.dir}"
        onmouseenter="showPreview(this)" onmouseleave="clearPreview()"
        onclick="placeFromCandidate(this)">
        <span class="cand-dot" style="${dotStyle}"></span>
        <span>${esc(item.word)}</span>
        ${item.overlapCount>1?`<span class="cand-badge">${item.overlapCount} overlaps</span>`:''}
      </div>`;
    }
  }
  list.innerHTML=html;
}

function showPreview(el){
  previewWord={word:decodeURIComponent(el.dataset.word),row:+el.dataset.row,col:+el.dataset.col,dir:el.dataset.dir};
  draw();
}
function clearPreview(){ previewWord=null; previewWordAll=null; draw(); }

// Returns every valid placement of `word` on the current grid
function getAllPlacements(word) {
  const letters = stripWord(word);
  const len = letters.length;
  const placements = [];
  for (const dir of ['h','v']) {
    const rowMax = dir==='h' ? GRID_SIZE     : GRID_SIZE - len;
    const colMax = dir==='h' ? GRID_SIZE - len : GRID_SIZE;
    for (let sr=0; sr<=rowMax; sr++) {
      for (let sc=0; sc<=colMax; sc++) {
        let valid = true;
        for (let i=0; i<len; i++) {
          const r = dir==='h' ? sr     : sr+i;
          const c = dir==='h' ? sc+i   : sc;
          const ex = cells[r][c];
          if (ex && ex.letter !== letters[i]) { valid=false; break; }
        }
        if (valid && placementPassesFlags(sr, sc, dir, len)) placements.push({word, row:sr, col:sc, dir});
      }
    }
  }
  return placements;
}

function showWordAllPlacements(encodedWord) {
  const word = decodeURIComponent(encodedWord);
  previewWord = null;
  previewWordAll = getAllPlacements(word);
  draw();
}

function clearWordAllPlacements() {
  previewWordAll = null;
  draw();
}
function placeFromCandidate(el){
  placeWordOnGrid(decodeURIComponent(el.dataset.word),+el.dataset.row,+el.dataset.col,el.dataset.dir);
  previewWord=null; updateCandidates();
}

function getOrCreateUnclassifiedCat() {
  const existing = categories.find(c => c.id === 'cat_unclassified');
  if (existing) return existing;
  const cat = { id: 'cat_unclassified', name: 'Unclassified', color: '#636e72', words: [] };
  categories.push(cat);
  updateCatSelect();
  return cat;
}

function placeFromDictCandidate(el) {
  const word = decodeURIComponent(el.dataset.word);
  // Add to Unclassified category if not already in any category
  if (!catForWord(word)) {
    const cat = getOrCreateUnclassifiedCat();
    if (!cat.words.includes(word)) cat.words.push(word);
  }
  placeWordOnGrid(word, +el.dataset.row, +el.dataset.col, el.dataset.dir);
  previewWord = null; updateCandidates();
}

// ═══════════════════════════════════════════════
// DICTIONARY LOOKUP
// ═══════════════════════════════════════════════
let dictWords = null; // null = not loaded, [] = loaded

async function loadDictionary() {
  if (dictWords !== null) return dictWords;
  const btn = document.getElementById('dict-btn');
  btn.textContent = 'Loading…';
  btn.disabled = true;
  try {
    const res = await fetch('dict.txt');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    dictWords = text.split(/\r?\n/)
      .map(w => w.trim().toUpperCase())
      .filter(w => w.length >= 2 && /^[A-Z]+$/.test(w));
  } catch(err) {
    dictWords = null;
    throw err;
  } finally {
    btn.textContent = 'Dict 🔍';
    btn.disabled = false;
  }
  return dictWords;
}

// Find dictionary words that fit at the selected cell with overlap >= 2
function getDictCandidates(selRow, selCol, dict) {
  const anchorLetter = cells[selRow][selCol]?.letter;
  if (!anchorLetter) return [];

  const results = [];
  const seen = new Set(); // deduplicate word+dir+start combos

  for (const word of dict) {
    const len = word.length;

    for (const dir of ['h', 'v']) {
      // Try each position of the word at which the anchor letter sits
      for (let i = 0; i < len; i++) {
        if (word[i] !== anchorLetter) continue;

        const startRow = dir === 'h' ? selRow : selRow - i;
        const startCol = dir === 'h' ? selCol - i : selCol;
        if (startRow < 0 || startCol < 0) continue;
        const endRow = dir === 'h' ? startRow : startRow + len - 1;
        const endCol = dir === 'h' ? startCol + len - 1 : startCol;
        if (endRow >= GRID_SIZE || endCol >= GRID_SIZE) continue;

        let valid = true, overlapCount = 0;
        for (let j = 0; j < len; j++) {
          const r = dir === 'h' ? startRow : startRow + j;
          const c = dir === 'h' ? startCol + j : startCol;
          const ex = cells[r][c];
          if (ex) {
            if (ex.letter !== word[j]) { valid = false; break; }
            overlapCount++;
          }
        }
        if (!valid || overlapCount < 2) continue;
        if (!placementPassesFlags(startRow, startCol, dir, len)) continue;

        const key = `${word}|${dir}|${startRow}|${startCol}`;
        if (seen.has(key)) continue;
        seen.add(key);

        results.push({ word, row: startRow, col: startCol, dir, overlapCount });
        break; // one placement per direction per word
      }
    }
  }

  results.sort((a, b) => b.overlapCount - a.overlapCount);
  return results;
}

async function lookUpDictionary() {
  if (!selectedCell) return;
  const {row, col} = selectedCell;
  if (!cells[row][col]?.letter) {
    document.getElementById('cand-sel').textContent = `(${col}, ${row}) — type a letter first`;
    return;
  }

  const list = document.getElementById('cand-list');
  const btn  = document.getElementById('dict-btn');

  // Show loading state
  list.innerHTML = '<div class="no-cand">Loading dictionary…</div>';
  btn.textContent = 'Loading…';
  btn.disabled = true;

  let dict;
  try {
    dict = await loadDictionary();
  } catch(err) {
    list.innerHTML = `<div class="no-cand">⚠ Could not load dict.txt — make sure it is in the same folder as the HTML file. (${err.message})</div>`;
    return;
  }

  const dictCands = getDictCandidates(row, col, dict);

  // Re-render normal candidates first, then append dict section
  updateCandidates();

  if (!dictCands.length) {
    list.innerHTML += '<div class="cand-dir">📖 Dictionary — no matches with 2+ overlaps</div>';
    return;
  }

  const byDir = { h: [], v: [] };
  for (const c of dictCands) byDir[c.dir].push(c);

  let html = '<div class="cand-dir" style="margin-top:0.4rem;color:#888;">📖 Dictionary matches</div>';
  for (const [dir, items] of Object.entries(byDir)) {
    if (!items.length) continue;
    html += `<div class="cand-dir">${dir === 'h' ? '→ Horizontal' : '↓ Vertical'}</div>`;
    for (const item of items) {
      html += `<div class="cand-item cand-dict"
        data-word="${encodeURIComponent(item.word)}"
        data-row="${item.row}" data-col="${item.col}" data-dir="${item.dir}"
        onmouseenter="showPreview(this)" onmouseleave="clearPreview()"
        onclick="placeFromDictCandidate(this)">
        <span class="cand-dot" style="background:#555"></span>
        <span>${esc(item.word)}</span>
        <span class="cand-dict-label">${item.overlapCount} overlaps</span>
      </div>`;
    }
  }

  list.innerHTML += html;
}

// ═══════════════════════════════════════════════
// CATEGORY MANAGEMENT
// ═══════════════════════════════════════════════
const CAT_COLORS=['#ff6b6b','#4ecdc4','#ffd93d','#a29bfe','#fd79a8','#55efc4','#74b9ff','#e17055','#81ecec'];

function addCategory() {
  const inp=document.getElementById('new-cat-input');
  const name=inp.value.trim(); if(!name) return;
  snapshot();
  const id='cat'+(++catIdSeq)+'_'+Date.now();
  const color=CAT_COLORS[categories.length % CAT_COLORS.length];
  categories.push({id, name, color, words:[]});
  inp.value='';
  renderWordList(); updateCatSelect();
}

function deleteCategory(catId) {
  const cat=catById(catId); if(!cat) return;
  if(cat.words.length && !confirm(`Delete "${cat.name}"? Its ${cat.words.length} word(s) will move to the first remaining category.`)) return;
  snapshot();
  const remaining=categories.filter(c=>c.id!==catId);
  if(remaining.length && cat.words.length) {
    for(const w of cat.words) remaining[0].words.push(w);
  }
  categories=remaining.length ? remaining : [{id:'cat_default',name:'Words',color:'#74b9ff',words:[...cat.words]}];
  collapsedCats.delete(catId);
  renderWordList(); updateCatSelect(); rescanPlacedWords(); draw();
}

function renameCat(catId, val) {
  const cat=catById(catId); if(!cat) return;
  const name=val.trim(); if(name) cat.name=name;
  updateCatSelect();
}

function changeCatColor(catId, color) {
  const cat=catById(catId); if(!cat) return;
  cat.color=color;
  // Refresh swatch background inline
  const swatch=document.querySelector(`.cat-section[data-cat="${catId}"] .cat-swatch`);
  if(swatch) swatch.style.background=color;
  draw();
}

function toggleCatCollapse(catId, e) {
  if(e.target.closest('input')||e.target.tagName==='SELECT') return;
  if(collapsedCats.has(catId)) collapsedCats.delete(catId); else collapsedCats.add(catId);
  const section=document.querySelector(`.cat-section[data-cat="${catId}"]`);
  if(section) section.classList.toggle('collapsed', collapsedCats.has(catId));
}

function addWord() {
  const winp=document.getElementById('new-word-input');
  const csel=document.getElementById('new-word-cat');
  const val=winp.value.trim(); if(!val) return;
  const formatted=val.replace(/\b\w/g,c=>c.toUpperCase());
  if(allWords().includes(formatted)){winp.value='';return;}
  snapshot();
  const cat=catById(csel.value)||categories[0];
  if(cat) cat.words.push(formatted);
  winp.value='';
  rescanPlacedWords(); updateCatSelect(); draw();
}

function deleteWord(catId, word) {
  const cat=catById(catId); if(!cat) return;
  snapshot();
  cat.words=cat.words.filter(w=>w!==word);
  rescanPlacedWords(); draw();
}

function moveWordToCategory(word, fromCatId, toCatId) {
  if(fromCatId===toCatId) return;
  snapshot();
  const from=catById(fromCatId); if(from) from.words=from.words.filter(w=>w!==word);
  const to=catById(toCatId); if(to&&!to.words.includes(word)) to.words.push(word);
  rescanPlacedWords(); draw();
}

// ═══════════════════════════════════════════════
// WORD LIST RENDER
// ═══════════════════════════════════════════════
function renderWordList() {
  const div=document.getElementById('word-list');
  let html='';
  for(const cat of categories) {
    const isCollapsed=collapsedCats.has(cat.id);
    const placed=cat.words.filter(w=>placedWordSet.has(w)).length;
    const catOpts=categories.map(c=>`<option value="${esc(c.id)}">${esc(c.name)}</option>`).join('');
    html+=`<div class="cat-section${isCollapsed?' collapsed':''}" data-cat="${cat.id}">
      <div class="cat-header" onclick="toggleCatCollapse('${cat.id}',event)">
        <div class="cat-swatch" style="background:${cat.color}" title="Change colour" onclick="event.stopPropagation()">
          <input type="color" value="${cat.color}"
            oninput="changeCatColor('${cat.id}',this.value)"
            onchange="changeCatColor('${cat.id}',this.value)">
        </div>
        <input class="cat-name-input" value="${esc(cat.name)}"
          onclick="event.stopPropagation()" onkeydown="event.stopPropagation()"
          onblur="renameCat('${cat.id}',this.value)"
          onkeydown="if(event.key==='Enter')this.blur();event.stopPropagation()">
        <span class="cat-count">${placed}/${cat.words.length}</span>
        <span class="cat-delete" onclick="event.stopPropagation();deleteCategory('${cat.id}')" title="Delete category">✕</span>
        <span class="cat-chevron">▾</span>
      </div>
      <div class="cat-words" data-cat="${cat.id}"
        ondragover="catDragOver(event,this)" ondragleave="catDragLeave(this)"
        ondrop="catDrop(event,'${cat.id}')">`;

    for(const word of cat.words) {
      const isPlaced=placedWordSet.has(word);
      html+=`<div class="word-item${isPlaced?' placed':''}" draggable="true"
          data-word="${encodeURIComponent(word)}" data-cat="${cat.id}"
          ondragstart="wordDragStart(event,'${cat.id}')"
          ondragend="wordDragEnd()"
          onmouseenter="showWordAllPlacements('${encodeURIComponent(word)}')"
          onmouseleave="clearWordAllPlacements()">
          <span class="word-dot"></span>
          <span class="word-label" title="${esc(word)}">${esc(word)}</span>
          <select class="word-move-select" title="Move to category"
            onchange="moveWordToCategory('${esc(word)}','${cat.id}',this.value);this.value='${cat.id}'"
            onclick="event.stopPropagation()">
            ${catOpts}
          </select>
          <span class="word-del" onclick="deleteWord('${cat.id}','${esc(word)}')" title="Remove word">✕</span>
        </div>`;
    }
    html+=`</div></div>`;
  }
  div.innerHTML=html;
  // Fix select values after render
  div.querySelectorAll('.word-move-select').forEach(sel => {
    const catId = sel.closest('.cat-words').dataset.cat;
    sel.value = catId;
  });
}

function updateCatSelect() {
  const sel=document.getElementById('new-word-cat');
  const cur=sel.value;
  sel.innerHTML=categories.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
  if(categories.find(c=>c.id===cur)) sel.value=cur;
}

// ═══════════════════════════════════════════════
// DRAG & DROP
// ═══════════════════════════════════════════════
function wordDragStart(e, catId) {
  const word=decodeURIComponent(e.currentTarget.dataset.word);
  dragState={word, fromCatId:catId, toGrid:false};
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='copyMove';
  e.dataTransfer.setData('text/plain', word);
  dragGhost.textContent=word;
  dragGhost.style.display='block';
  try { e.dataTransfer.setDragImage(dragGhost,0,0); } catch(_){}
}

function wordDragEnd() {
  // If the drop didn't land on the grid, clear any lingering preview
  previewWord = null;
  draw();
  dragState=null;
  dragGhost.style.display='none';
  document.querySelectorAll('.word-item.dragging').forEach(el=>el.classList.remove('dragging'));
}

function catDragOver(e, el) {
  if(!dragState) return;
  e.preventDefault(); e.dataTransfer.dropEffect='move';
  el.classList.add('drag-over');
}

function catDragLeave(el) { el.classList.remove('drag-over'); }

function catDrop(e, toCatId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!dragState) return;
  moveWordToCategory(dragState.word, dragState.fromCatId, toCatId);
}

// ── Grid drag-over / drop ──────────────────────────────────────────
function gridCellFromDragEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  const col = Math.floor((e.clientX - rect.left) * sx / cellSize);
  const row = Math.floor((e.clientY - rect.top)  * sy / cellSize);
  return { row, col };
}

viewport.addEventListener('dragover', e => {
  if (!dragState) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';

  const { row, col } = gridCellFromDragEvent(e);
  if (row < 0 || row >= GRID_SIZE || col < 0 || col >= GRID_SIZE) {
    previewWord = null;
  } else {
    previewWord = { word: dragState.word, row, col, dir: currentDir };
  }
  draw();
});

viewport.addEventListener('dragleave', e => {
  // Only clear if leaving the viewport entirely
  if (!viewport.contains(e.relatedTarget)) {
    previewWord = null;
    draw();
  }
});

viewport.addEventListener('drop', e => {
  e.preventDefault();
  if (!dragState) return;

  const { row, col } = gridCellFromDragEvent(e);
  if (row >= 0 && row < GRID_SIZE && col >= 0 && col < GRID_SIZE) {
    placeWordOnGrid(dragState.word, row, col, currentDir);
  }
  previewWord = null;
  dragState = null;
  dragGhost.style.display = 'none';
  document.querySelectorAll('.word-item.dragging').forEach(el => el.classList.remove('dragging'));
  draw();
});

// ═══════════════════════════════════════════════
// EXPORT / IMPORT  (copy/paste — works on file://)
// ═══════════════════════════════════════════════
function getStateJSON() {
  const sparseCells = [];
  for (let r = 0; r < GRID_SIZE; r++)
    for (let c = 0; c < GRID_SIZE; c++)
      if (cells[r][c]) sparseCells.push(`${cells[r][c].letter}:${r}:${c}`);

  const data = {
    version: 5,
    categories: categories.map(c=>({id:c.id, name:c.name, color:c.color, words:[...c.words]})),
    cells: sparseCells
  };
  return JSON.stringify(data);
}

const LS_KEY = 'puzzle_builder_state';

function saveToLocalStorage() {
  try { localStorage.setItem(LS_KEY, getStateJSON()); } catch(_) {}
}

function loadStateJSON(text) {
  const data = JSON.parse(text);
  if (data.categories) {
    categories = data.categories.map(c=>({
      id: c.id||('cat_'+Date.now()),
      name: c.name||'Unnamed',
      color: c.color||'#74b9ff',
      words: [...(c.words||[])]
    }));
  } else if (data.wordBank) {
    categories = [{id:'cat_imported',name:'Imported',color:'#74b9ff',words:[...data.wordBank]}];
  }
  // Clear grid first
  for (let r=0;r<GRID_SIZE;r++) for (let c=0;c<GRID_SIZE;c++) cells[r][c]=null;
  if (data.cells && data.cells.length > 0) {
    if (typeof data.cells[0] === 'string') {
      // v5 compact string format: "L:row:col"
      for (const entry of data.cells) {
        const [l, r, c] = entry.split(':');
        const row = parseInt(r), col = parseInt(c);
        if (row>=0&&row<GRID_SIZE&&col>=0&&col<GRID_SIZE)
          cells[row][col] = {letter: l, wordIds: new Set()};
      }
    } else if (typeof data.cells[0] === 'object' && 'r' in data.cells[0]) {
      // v4 sparse object format
      for (const {r, c, l} of data.cells)
        if (r>=0&&r<GRID_SIZE&&c>=0&&c<GRID_SIZE)
          cells[r][c] = {letter: l, wordIds: new Set()};
    } else {
      // v3 full 100x100 array format (legacy)
      for (let r=0;r<GRID_SIZE;r++)
        for (let c=0;c<GRID_SIZE;c++)
          if (data.cells[r]?.[c]) cells[r][c] = {letter:data.cells[r][c], wordIds:new Set()};
    }
  }
  collapsedCats.clear();
  updateCatSelect(); rescanPlacedWords(); draw();
  saveToLocalStorage();
}

function exportState() {
  const json = getStateJSON();
  const ta = document.getElementById('modal-textarea');
  ta.value = json;

  document.getElementById('modal-title').textContent = 'Export';
  document.getElementById('modal-desc').textContent = 'Download the file, or copy the JSON text to save manually.';
  document.getElementById('modal-note').textContent = 'Tip: Select All (⌘A) then Copy (⌘C)';
  document.getElementById('modal-btns').innerHTML = `
    <button class="btn" onclick="downloadExport()">Download File</button>
    <button class="btn" onclick="copyModalText()">Copy to Clipboard</button>
    <button class="btn" onclick="closeModal()">Close</button>
  `;
  document.getElementById('io-modal').classList.remove('hidden');
  setTimeout(()=>{ ta.focus(); ta.select(); }, 50);
}

function downloadExport() {
  const json = document.getElementById('modal-textarea').value;
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(json);
  a.download = 'puzzle.json';
  a.click();
}

function importState() {
  document.getElementById('modal-textarea').value = '';
  document.getElementById('modal-title').textContent = 'Import';
  document.getElementById('modal-desc').textContent = 'Either choose a saved .json file, or paste the JSON text below.';
  document.getElementById('modal-note').textContent = '';
  document.getElementById('modal-note').style.color = '';
  document.getElementById('modal-btns').innerHTML = `
    <label class="btn" style="cursor:pointer">
      Choose file…
      <input type="file" accept=".json" style="display:none" onchange="importFileChosen(this)">
    </label>
    <button class="btn" onclick="loadFromModal()">Load pasted JSON</button>
    <button class="btn" onclick="closeModal()">Cancel</button>
  `;
  document.getElementById('io-modal').classList.remove('hidden');
  setTimeout(()=>document.getElementById('modal-textarea').focus(), 50);
}

function importFileChosen(input) {
  const file = input.files[0];
  if (!file) return;
  const note = document.getElementById('modal-note');
  note.style.color = '';
  note.textContent = `Reading ${file.name}…`;
  file.text().then(text => {
    try {
      loadStateJSON(text);
      closeModal();
    } catch(err) {
      note.textContent = '⚠ Error: ' + err.message;
      note.style.color = '#ff453a';
    }
  }).catch(err => {
    note.textContent = '⚠ Could not read file: ' + err.message;
    note.style.color = '#ff453a';
  });
}

function copyModalText() {
  const ta = document.getElementById('modal-textarea');
  ta.select();
  try {
    const ok = document.execCommand('copy');
    if (ok) {
      const btn = document.querySelector('#modal-btns .btn');
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(()=>btn.textContent=orig, 1500);
    }
  } catch(_) {}
  // Also try modern API
  if (navigator.clipboard) navigator.clipboard.writeText(ta.value).catch(()=>{});
}

function loadFromModal() {
  const text = document.getElementById('modal-textarea').value.trim();
  if (!text) return;
  try {
    loadStateJSON(text);
    closeModal();
  } catch(err) {
    document.getElementById('modal-note').textContent = '⚠ Error: ' + err.message;
    document.getElementById('modal-note').style.color = '#ff453a';
  }
}

function closeModal() {
  document.getElementById('io-modal').classList.add('hidden');
}

// Close on Escape
window.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !document.getElementById('io-modal').classList.contains('hidden')) {
    closeModal();
  }
});

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
updateCatSelect();
updateCanvasSize();

// Restore from localStorage if available, otherwise use default data
const _saved = (() => { try { return localStorage.getItem(LS_KEY); } catch(_){return null;} })();
if (_saved) {
  try { loadStateJSON(_saved); } catch(_) { rescanPlacedWords(); }
} else {
  rescanPlacedWords();
}
updateCandidates();

// Scroll so the central 30×30 region is centred in the viewport
requestAnimationFrame(() => {
  const regionStart = 35; // (100 - 30) / 2
  const regionCentre = (regionStart + 15) * cellSize; // centre of 30x30
  viewport.scrollLeft = regionCentre - viewport.clientWidth  / 2;
  viewport.scrollTop  = regionCentre - viewport.clientHeight / 2;
});
</script>
